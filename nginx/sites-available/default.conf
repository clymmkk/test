server {
    listen       80;
    server_name  localhost;

    # 添加调试响应头，验证请求经过 Nginx
    add_header X-Proxy-By nginx always;

    # 1. 静态资源服务：Vue SPA 单页应用
    location / {
        root   C:/Users/cly/Desktop/nginx/frontend/dist;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. 标准 API 前缀转发（经典场景）
    location /api/ {
        proxy_pass         http://127.0.0.1:6000;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # 3. 子服务路由：管理面板独立服务
    location /admin/ {
        proxy_pass         http://127.0.0.1:6001;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # 4. 文件服务路由：上传服务
    location /upload/ {
        proxy_pass         http://127.0.0.1:6002;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        client_max_body_size 100M;
    }

    # 5. 路径重写：外部路径映射到内部不同路径
    location /service/v1/ {
        # 客户端访问 /service/v1/hello，实际转发到 http://127.0.0.1:6000/api/hello
        proxy_pass         http://127.0.0.1:6000/api/;
        proxy_set_header   Host             $host;
    }

    # 6. 对比场景：proxy_pass 末尾不带斜杠（保留 location 匹配部分）
    location /api-v2 {
        proxy_pass         http://127.0.0.1:6000;  # 不带斜杠
        proxy_set_header   Host             $host;
    }
}
